[package]
name = "streamfusion"
version = "0.1.0"
edition = "2021"

[lib]
name = "streamfusion"
# rlib alongside cdylib so the benchmarks can link the engine directly (the JVM loads the cdylib).
crate-type = ["cdylib", "rlib"]

[dependencies]
jni = "0.21"
arrow = { version = "58", features = ["ffi"] }
datafusion = "53.1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
futures = "0.3"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "operators"
harness = false
