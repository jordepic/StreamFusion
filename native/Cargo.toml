[package]
name = "streamfusion"
version = "0.1.0"
edition = "2021"

[lib]
name = "streamfusion"
# rlib alongside cdylib so the benchmarks can link the engine directly (the JVM loads the cdylib).
crate-type = ["cdylib", "rlib"]

[dependencies]
jni = "0.21"
arrow = { version = "58", features = ["ffi", "json"] }
# Native file readers, both driven through DataFusion's file-scan execution (projection pushdown,
# row-group/stripe range selection) — datafusion's built-in Parquet source and datafusion-orc's ORC
# source. datafusion-orc is not published for this datafusion version, so it is pinned by git rev;
# orc-rust (published) is used directly only to read an ORC file's schema before building the scan.
datafusion-orc = { git = "https://github.com/datafusion-contrib/datafusion-orc.git", rev = "6c07fa282dc8d62db2aa4ded06ab55485efc811a" }
orc-rust = "0.8"
parquet = { version = "58", features = ["arrow"] }
datafusion = "53.1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
futures = "0.3"
# Fast hashing for the per-row grouping map (the same hasher arrow/datafusion use internally).
ahash = "0.8"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "operators"
harness = false
