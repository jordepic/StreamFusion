[package]
name = "streamfusion"
version = "0.1.0"
edition = "2021"

[lib]
name = "streamfusion"
# rlib alongside cdylib so the benchmarks can link the engine directly (the JVM loads the cdylib).
crate-type = ["cdylib", "rlib"]

[dependencies]
jni = "0.21"
arrow = { version = "58", features = ["ffi", "json"] }
# Native ORC file reader (reads directly into Arrow; arrow 58, matching the rest of the tree).
orc-rust = "0.8"
parquet = { version = "58", features = ["arrow"] }
datafusion = "53.1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
futures = "0.3"
# Fast hashing for the per-row grouping map (the same hasher arrow/datafusion use internally).
ahash = "0.8"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "operators"
harness = false
