syntax = "proto3";

// The message a `format = 'protobuf'` Kafka table names via message-class-name in the parity test.
// java_multiple_files puts Row at the top level so the class name is simply ...proto.Row.
package streamfusion.test;

option java_package = "io.github.jordepic.streamfusion.proto";
option java_multiple_files = true;

message Row {
  int64 id = 1;
  string name = 2;
  double score = 3;
}

// Every scalar field type the native decode reproduces identically to Flink: signed ints, float,
// double, bool, string. (uint/fixed map to unsigned in the Arrow decoder but signed in Flink, and
// bytes/enum have no supported row-boundary type, so those are excluded and fall back.)
message Scalars {
  int32 i32 = 1;
  int64 i64 = 2;
  bool flag = 3;
  float f32 = 4;
  double f64 = 5;
  string text = 6;
  sint32 si32 = 7;
  sint64 si64 = 8;
}

// A message with a nested message field → a ROW column. Now that the row boundary carries nested
// types, a table over this routes natively (verified identical to Flink).
message WithNested {
  int64 id = 1;
  Row nested = 2;
}

// Repeated and map fields → ARRAY and MAP columns, plus a nested message — the full set of complex
// column shapes the boundary now carries.
message Complex {
  int64 id = 1;
  repeated int64 nums = 2;
  map<string, int64> tags = 3;
  Row nested = 4;
}
